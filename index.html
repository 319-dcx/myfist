<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片取证工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <div class="header">
        <h1>涉案图片取证分析平台</h1>
    </div>
    <div class="toolbar">
        <input type="file" id="uploadBtn" multiple accept="image/*">
        <button id="analyzeBtn">🔍 开始分析</button>
        <button id="groupBtn">📍 查看分组</button>
        <button id="saveCaseBtn">💾 保存案件</button>
        <button id="loadCaseBtn">📂 加载案件</button>
        <button id="reportBtn">📄 生成报告</button>
        <label style="margin-left: 15px; font-size: 14px; user-select: none;">
            <input type="checkbox" id="enableTimeCheck"> 启用时间篡改检测（可能因文件复制误报）
        </label>
    </div>
    <div class="main-content">
        <div class="image-list-panel">
            <div class="list-header">
                <span>📷 图片列表</span>
                <span id="imageCount">0张</span>
            </div>
            <div id="list"></div>
        </div>
        <div class="preview-panel">
            <div class="preview-header">🔎 图片预览</div>
            <div class="preview-content">
                <img id="previewImg" src="" alt="预览图片">
                <div class="exif-card" id="info">点击左侧图片查看Exif信息</div>
            </div>
        </div>
    </div>
</div>
<!-- exifr 库来用于解析图片的 Exif 数据（拍摄时间、GPS 等） -->
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

<!-- 核心函数库：包含 getExif、detectPS、checkTamper、groupByLocation、makeReport 等自定义函数 -->
<script src="myfunctions.js"></script>

<!-- 处理界面交互、上传图片、分析、报告生成、案件保存加载 -->
<script src="script.js"></script>
</body>
</html>
