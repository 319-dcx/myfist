<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片取证工具</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet 地图库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>涉案图片取证分析平台</h1>
    </div>
    <div class="toolbar">
        <input type="file" id="uploadBtn" multiple accept="image/*">
        <button id="analyzeBtn">🔍 开始分析</button>
        <button id="groupBtn">📍 查看分组</button>
        <button id="saveCaseBtn">💾 保存案件</button>
        <button id="loadCaseBtn">📂 加载案件</button>
        <button id="reportBtn">📄 生成报告</button>
        <button id="trackBtn">查看嫌疑人轨迹</button>
        <button id="aiReportBtn">🤖 AI 分析报告</button>
        
        <label style="margin-left: 15px; font-size: 14px; user-select: none;">
            <input type="checkbox" id="enableTimeCheck"> 启用时间篡改检测
        </label>
    </div>
    <div class="main-content">
        <div class="image-list-panel">
            <div class="list-header">
                <span>📷 图片列表</span>
                <span id="imageCount">0张</span>
            </div>
            <div id="list"></div>
        </div>
        <div class="preview-panel">
            <div class="preview-header">🔎 图片预览</div>
            <div class="preview-content">
                <img id="previewImg" src="" alt="预览图片">
                <div class="exif-card" id="info">点击左侧图片查看Exif信息</div>
            </div>
            <div id="mapContainer" style="width: 100%; height: 500px; margin-top: 20px; display: none;">
                <div id="trackMap" style="height: 100%;"></div>
            </div>
            <!-- AI 分析结果区域（初始隐藏） -->
            <div id="aiResult" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; display: none;">
                <h3 style="margin-top: 0;">🤖 AI 鉴定建议</h3>
                <div id="aiContent" style="white-space: pre-wrap; line-height: 1.5;"></div>
            </div>
        </div>
    </div>
</div>
<!-- exifr 库来用于解析图片的 Exif 数据（拍摄时间、GPS 等） -->
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

<!-- 核心函数库：包含 getExif、detectPS、checkTamper、groupByLocation、makeReport 等自定义函数 -->
<script src="myfunctions.js"></script>

<!-- 处理界面交互、上传图片、分析、报告生成、案件保存加载 -->
<script src="script.js"></script>
</body>
</html>
